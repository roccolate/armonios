name: Apply single GUI output copy API

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/el0-gui-info-usercopy

      - name: Apply substitutions
        run: |
          if [[ -f tools/apply_single_gui_copy_api.py ]]; then
            python3 tools/apply_single_gui_copy_api.py
          else
            echo "single GUI copy API already applied"
          fi

      - name: Commit generated GUI changes
        run: |
          if git diff --quiet; then
            echo "no generated changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Use one checked GUI output copy API"
          git push origin HEAD:agent/el0-gui-info-usercopy
