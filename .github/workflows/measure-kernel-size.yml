name: Apply zero-data kernel optimization

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/process-parent-wait-lifecycle
          fetch-depth: 0
      - name: Apply zero-data optimization
        run: python3 .github/scripts/zero_kernel_data.py
      - name: Install cross toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu
      - name: Verify size and lifecycle regression
        run: |
          make clean >/dev/null
          make -j2 >/dev/null
          make size
          bash tests/run_process_parent_wait_test.sh
      - name: Publish clean optimized tree
        run: |
          rm -f .github/kernel-size-diagnostic.txt
          rm -f .github/scripts/zero_kernel_data.py
          rm -f .github/workflows/measure-kernel-size.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Keep mutable kernel defaults in BSS"
          git push origin HEAD:agent/process-parent-wait-lifecycle
