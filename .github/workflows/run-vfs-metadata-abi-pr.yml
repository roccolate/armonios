name: Run VFS metadata ABI migration

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  migrate:
    if: github.head_ref == 'agent/v03-vfs-metadata-abi' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out ABI branch
        uses: actions/checkout@v4
        with:
          ref: agent/v03-vfs-metadata-abi

      - name: Extract and apply guarded migration
        id: apply
        continue-on-error: true
        run: |
          set -o pipefail
          {
            python3 - <<'PY'
          from pathlib import Path

          source = Path('.github/workflows/apply-vfs-metadata-abi.yml').read_text()
          start = source.find('H4sI')
          end = source.find('PAYLOAD', start)
          if start < 0 or end < 0:
              raise SystemExit('embedded ABI migration payload not found')
          payload = ''.join(line.strip() for line in source[start:end].splitlines())
          Path('/tmp/abi-migration.b64').write_text(payload + '\n')
          PY
            test -s /tmp/abi-migration.b64
            base64 -d /tmp/abi-migration.b64 | gzip -d > apply_vfs_metadata_abi.py
            python3 apply_vfs_metadata_abi.py
          } > migration-output.log 2>&1

      - name: Upload migration diagnostic
        if: steps.apply.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: vfs-metadata-abi-migration-error
          path: |
            migration-output.log
            apply_vfs_metadata_abi.py
          if-no-files-found: error
          retention-days: 7

      - name: Stop after migration failure
        if: steps.apply.outcome == 'failure'
        run: |
          cat migration-output.log
          exit 1

      - name: Install toolchain and QEMU
        if: steps.apply.outcome == 'success'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binutils-aarch64-linux-gnu \
            gcc \
            gcc-aarch64-linux-gnu \
            make \
            qemu-system-arm

      - name: Validate migrated ABI cut
        if: steps.apply.outcome == 'success'
        run: |
          make
          make size
          bash tests/run_fat32_directory_test.sh
          make -C tests test
          git diff --check

      - name: Publish clean functional commit
        if: steps.apply.outcome == 'success'
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/apply-vfs-metadata-abi.yml \
                 .github/workflows/run-vfs-metadata-abi-pr.yml \
                 tools/vfs-metadata-abi.trigger
          git add include/armonios/abi/version.h \
                  include/armonios/abi/syscall_numbers.h \
                  include/armonios/abi/vfs.h \
                  programs/libkarm/syscall.h \
                  kernel/vfs.h kernel/vfs.c \
                  kernel/fat32.h kernel/fat32_directory.c kernel/fat32_vfs.c \
                  kernel/syscall_internal.h kernel/syscall_vfs.c kernel/syscall.c \
                  tests/test_syscall_abi.c tests/test_fat32_directories.c \
                  tests/test_syscall_vfs_user_copy.c \
                  docs/SYSCALLS.md docs/FAT32_DIRECTORIES.md
          git commit -m "Add structured VFS metadata ABI"
          git push origin HEAD:agent/v03-vfs-metadata-abi
