name: Apply packed argv loader substitutions

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/el0-ipc-argv-usercopy

      - name: Apply exact substitutions
        run: |
          if [[ -f tools/apply_packed_argv_loader_patch.py ]]; then
            python3 tools/apply_packed_argv_loader_patch.py
          else
            echo "packed argv substitutions already applied"
          fi

      - name: Commit generated loader change
        run: |
          if git diff --quiet; then
            echo "no generated changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Pass packed argv blocks through the app loader"
          git push origin HEAD:agent/el0-ipc-argv-usercopy
