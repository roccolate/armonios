name: Apply VFS KLI1 spawn migration

on:
  push:
    branches:
      - agent/sdk-foundation-08-spawn-vfs-kli1
    paths:
      - tools/apply_spawn_vfs_kli1_patch.py
      - .github/workflows/apply-spawn-vfs-kli1.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out migration branch
        uses: actions/checkout@v4
        with:
          ref: agent/sdk-foundation-08-spawn-vfs-kli1
          fetch-depth: 0

      - name: Apply exact source replacements
        run: python3 tools/apply_spawn_vfs_kli1_patch.py

      - name: Remove migration-only files
        run: |
          rm -f tools/apply_spawn_vfs_kli1_patch.py
          rm -f .github/workflows/apply-spawn-vfs-kli1.yml

      - name: Validate and commit migration
        run: |
          git diff --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Allow spawn to load KLI1 images from VFS paths"
          git push origin HEAD:agent/sdk-foundation-08-spawn-vfs-kli1
