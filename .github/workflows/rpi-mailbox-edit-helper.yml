name: RPi mailbox build edit helper

on:
  push:
    branches:
      - agent/rpi4-emmc2-clock-probe

permissions:
  contents: write

jobs:
  edit-makefile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/rpi4-emmc2-clock-probe
      - name: Link mailbox only for RPi4
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('Makefile')
          text = path.read_text()
          old = 'STORAGE_DEV := $(BUILD_DIR)/drivers/storage/emmc.o\n'
          new = ('STORAGE_DEV := \\\n'
                 '    $(BUILD_DIR)/drivers/storage/emmc.o \\\n'
                 '    $(BUILD_DIR)/drivers/firmware/rpi_mailbox.o\n')
          if old in text:
              path.write_text(text.replace(old, new, 1))
          elif new not in text:
              raise SystemExit('expected STORAGE_DEV assignment not found')
          PY
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add Makefile
          git commit -m "Link the RPi firmware mailbox in board builds"
          git push origin HEAD:agent/rpi4-emmc2-clock-probe
