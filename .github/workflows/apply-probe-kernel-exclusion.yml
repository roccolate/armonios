name: Apply full probe kernel exclusion

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/el0-ipc-argv-usercopy

      - name: Apply exact substitution
        run: |
          if [[ -f tools/apply_probe_kernel_exclusion.py ]]; then
            python3 tools/apply_probe_kernel_exclusion.py
          else
            echo "probe kernel exclusion already applied"
          fi

      - name: Commit generated exclusion
        run: |
          if git diff --quiet; then
            echo "no generated changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Exclude the normal kernel from the physical probe"
          git push origin HEAD:agent/el0-ipc-argv-usercopy
