name: Apply GUI output usercopy

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/el0-gui-info-usercopy

      - name: Apply exact substitutions
        run: |
          if [[ -f tools/apply_gui_usercopy_patch.py ]]; then
            python3 tools/apply_gui_usercopy_patch.py
          else
            echo "GUI usercopy substitutions already applied"
          fi

      - name: Commit generated GUI changes
        run: |
          if git diff --quiet; then
            echo "no generated changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Copy GUI syscall outputs through kernel buffers"
          git push origin HEAD:agent/el0-gui-info-usercopy
