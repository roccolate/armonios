name: Run storage migration for draft PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Execute guarded migration script
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import textwrap

          workflow = Path('.github/workflows/storage-stack-migration.yml').read_text()
          marker = "python3 - <<'PY'\n"
          body = workflow.split(marker, 1)[1].split('\n          PY', 1)[0]
          exec(compile(textwrap.dedent(body), '<storage-migration>', 'exec'))
          PY
      - name: Commit migrated orchestration
        run: |
          if git diff --quiet; then
            echo "No migration changes"
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add kernel/kernel.c
          git commit -m "Mount FAT32 through block devices"
          git push origin HEAD:${{ github.head_ref }}
