name: Apply VFS path migration

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  migrate:
    if: github.head_ref == 'agent/v03-vfs-path-resolution' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out migration branch
        uses: actions/checkout@v4
        with:
          ref: agent/v03-vfs-path-resolution

      - name: Apply guarded VFS migration
        run: python3 tools/apply_vfs_path_migration.py

      - name: Run focused VFS path gate
        run: bash tests/run_vfs_path_test.sh

      - name: Commit canonical path implementation
        run: |
          git diff --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add kernel/vfs.c
          if git diff --cached --quiet; then
            echo "No migration changes to commit"
            exit 0
          fi
          git commit -m "Canonicalize VFS paths before mount dispatch"
          git push origin HEAD:agent/v03-vfs-path-resolution
