name: Apply v0.3 documentation synchronization

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'docs/sync-v03-storage-abi' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/sync-v03-storage-abi
      - name: Synchronize canonical documentation
        run: |
          python3 - <<'PY'
          from pathlib import Path

          UPDATE = (
              "\n> **Implementation update — 2026-07-23:** The older audit sections in "
              "this document predate merged v0.3 PRs #80, #81, #82, #90, and #93. "
              "Use `V03_IMPLEMENTATION_STATUS.md` for the current storage/VFS "
              "checkpoint. Issue #63 is closed; issue #76 remains the manual v0.2 "
              "validation and release-record task.\n"
          )

          def replace_exact(path, old, new):
              p = Path(path)
              text = p.read_text()
              if old not in text:
                  raise SystemExit(f"missing guarded text in {path}: {old!r}")
              p.write_text(text.replace(old, new, 1))

          def insert_update(path, title):
              p = Path(path)
              text = p.read_text()
              marker = title + "\n"
              if UPDATE.strip() in text:
                  return
              if marker not in text:
                  raise SystemExit(f"missing title in {path}")
              p.write_text(text.replace(marker, marker + UPDATE, 1))

          for path, title in [
              ("README.md", "# ArmoniOS"),
              ("docs/CURRENT_STATE.md", "# Current State"),
              ("docs/ROADMAP.md", "# Roadmap"),
              ("docs/ARCHITECTURE.md", "# Architecture"),
              ("docs/TECHNICAL_RISKS.md", "# Technical Risk Register"),
              ("docs/SYSCALLS.md", "# Syscall Reference"),
              ("docs/DEVELOPMENT_GUIDE.md", "# ArmoniOS Development Guide"),
          ]:
              insert_update(path, title)

          replace_exact(
              "README.md",
              "- **next architecture milestone:** v0.3 storage/VFS platform;",
              "- **current architecture work:** v0.3 storage/VFS foundations are partly landed; structured metadata is active in PR #95;",
          )
          replace_exact(
              "README.md",
              "5. [Architecture](docs/ARCHITECTURE.md) — implemented design.",
              "5. [Architecture](docs/ARCHITECTURE.md) — implemented design;\n6. [v0.3 Implementation Status](docs/V03_IMPLEMENTATION_STATUS.md) — current storage/VFS checkpoint.",
          )
          replace_exact(
              "README.md",
              "| FAT32 | Root directory, 8.3 names, no subdirectories or long names. |",
              "| FAT32 | Existing nested 8.3 trees are readable/listable; creation, deletion, and rename remain root-only; no long names. |",
          )
          replace_exact(
              "README.md",
              "The current FAT32 compatibility path supports 512-byte sectors, root 8.3 files,\ncluster growth, create/read/write/list/rename/delete, and dynamic `/fat/<name>` VFS\nnodes. It is not a general FAT implementation.",
              "The current FAT32 path supports 512-byte sectors, whole-device or primary-MBR\nmounting, bounded nested 8.3 traversal, and root-level create/write/rename/delete.\nNested mutation, long names, and durable reboot semantics remain incomplete; it is\nstill not a general FAT implementation.",
          )

          replace_exact(
              "docs/CURRENT_STATE.md",
              "The v0.2 cleanup/runtime-hardening implementation and planned automated runtime\nevidence have landed. Formal v0.2 promotion is still blocked by explicit\nresidual-risk decisions, the intermittent VMM investigation, a final dated visible\nworkflow, and the release record.",
              "The v0.2 cleanup/runtime-hardening implementation and automated evidence have\nlanded. The intermittent VMM fault was traced to EL1 IRQ frames entering process\npreemption and issue #63 is closed. Formal v0.2 promotion now remains blocked only\nby issue #76: the dated visible workflow, documentation record, tag, and release\nnotes on the exact validated tree.",
          )
          replace_exact(
              "docs/CURRENT_STATE.md",
              "| v0.2 cleanup/hardening | PROMOTION CANDIDATE | Runtime implementation/evidence landed. Risk disposition, issue #63, final visible evidence, and release record remain. |\n| v0.3 storage/VFS platform | NEXT AFTER v0.2 | No common path resolver, rich block descriptor, or structured filesystem ABI. |\n| v0.4 real FAT | PLANNED | Current FAT remains root-only FAT32 8.3. |",
              "| v0.2 cleanup/hardening | MANUAL PROMOTION PENDING | Automated implementation/evidence and issue #63 are complete; issue #76 visible validation and release record remain. |\n| v0.3 storage/VFS platform | IN PROGRESS | Block descriptors, board adapters, bounded partition views, canonical paths, mount resolution, and nested FAT32 traversal are landed; structured metadata is active in PR #95. |\n| v0.4 real FAT | EARLY PARTIAL | Existing nested 8.3 trees can be traversed, but long names and directory mutation transactions remain. |",
          )
          replace_exact(
              "docs/CURRENT_STATE.md",
              "- generic block descriptor and flush/read-only contract;\n- normalized path and mount resolver;\n- structured directory/metadata ABI;\n- mkdir, truncate, structured stat/readdir, filesystem info;\n- FAT long names/directories;",
              "- structured directory/metadata ABI promotion from PR #95;\n- filesystem-specific errors and filesystem information;\n- mkdir, rmdir, truncate, nested mutation, and explicit durability;\n- FAT long names and mutation-safe directory support;",
          )
          replace_exact(
              "docs/CURRENT_STATE.md",
              "1. Complete or explicitly disposition PR #64 / issue #63.\n2. Accept or replace the device-drop and full-redraw residuals in `RISK-017`.\n3. Run the full automated gate on the exact promotion tree.\n4. Run the dated visible FAT workflow on that tree.\n5. Close or accept `RISK-017` and `RISK-018` with rationale.\n6. Create the v0.2 tag and release record with exact identities and limitations.\n7. Begin v0.3 through small block-descriptor, path-normalizer, mount-resolver, and\n   structured-metadata cuts.",
              "1. Complete issue #76 on the exact validated `main` tree.\n2. Create the v0.2 tag and release record with exact identities and limitations.\n3. Finish structured VFS metadata in PR #95 without advancing the global ABI above 1.0.\n4. Add filesystem errors and filesystem information.\n5. Implement truncate, mkdir/rmdir, nested mutation, and durability in small tested cuts.\n6. Add VFAT long names only after the generic mutation contracts are stable.",
          )

          replace_exact(
              "docs/ROADMAP.md",
              "| v0.3 storage/VFS platform | NEXT AFTER v0.2 | Depends on formal v0.2 disposition |\n| v0.4 real FAT | PLANNED | Depends on v0.3 block/path/filesystem contracts |",
              "| v0.3 storage/VFS platform | IN PROGRESS | Core block/path/mount and nested traversal foundations landed; metadata and mutation contracts remain |\n| v0.4 real FAT | EARLY PARTIAL | Nested 8.3 read traversal exists; long names and mutation-safe directories depend on remaining v0.3 contracts |",
          )
          for old, new in [
              ("### Cut 1 — block-device descriptor", "### Cut 1 — block-device descriptor — LANDED"),
              ("### Cut 2 — path normalizer", "### Cut 2 — path normalizer — LANDED"),
              ("### Cut 3 — mount resolver", "### Cut 3 — mount resolver — LANDED"),
              ("### Cut 4 — structured kernel filesystem types", "### Cut 4 — structured kernel filesystem types — ACTIVE"),
              ("### Cut 6 — append-only public ABI", "### Cut 6 — append-only public ABI — ACTIVE IN PR #95"),
              ("### Cut 7 — compatibility migration", "### Cut 7 — compatibility migration — PARTLY LANDED"),
          ]:
              replace_exact("docs/ROADMAP.md", old, new)

          replace_exact(
              "docs/ARCHITECTURE.md",
              "Missing v0.3 foundations:\n\n- common path normalization and traversal policy;\n- structured directory entries and metadata;\n- rich block-device identity/capacity/read-only/flush contract;\n- generic mkdir and truncate;\n- structured stat, readdir, and filesystem-info ABI;\n- complete filesystem driver lifecycle.",
              "Landed v0.3 foundations:\n\n- canonical absolute-path normalization and longest-prefix mount resolution;\n- block-device capacity/read-only/flush contracts and bounded views;\n- whole-device and primary-MBR FAT32 mounting;\n- read-only traversal of existing nested FAT32 8.3 directory trees.\n\nRemaining foundations include native structured metadata promotion, filesystem\ninformation, generic mkdir/rmdir and truncate, nested mutation rollback, and an\nexplicit durable-flush contract.",
          )
          replace_exact(
              "docs/ARCHITECTURE.md",
              "- root-directory short 8.3 names;\n- list, open, create, read, write, rename, and delete;\n- cluster-chain growth;\n- dynamic `/fat/<name>` VFS nodes;\n- dynamic-node invalidation after rename/delete.\n\nIt does not support long names, subdirectories, FAT12/16, GPT, extended\npartitions, journaling, crash recovery, or broad interoperability.",
              "- short 8.3 names;\n- traversal, listing, stat, open, and read for existing nested directories;\n- root-level create, write, rename, and delete;\n- cluster-chain growth;\n- dynamic VFS nodes and invalidation after rename/delete.\n\nIt does not support long names, nested mutation transactions, mkdir/rmdir,\nFAT12/16, GPT, extended partitions, journaling, crash recovery, or broad\ninteroperability.",
          )

          replace_exact(
              "docs/TECHNICAL_RISKS.md",
              "Gaps:\n\n- no common normalized path resolver;\n- no explicit repeated-slash, `.`/`..`, component, or mount-boundary policy;\n- no rich block descriptor with capacity/read-only/flush contract;\n- no structured directory/metadata ABI;\n- no generic mkdir, truncate, stat, readdir, or filesystem-info operations;\n- no FAT long names/subdirectories;\n- no ext2 or reboot-persistence gate.",
              "Landed foundations include the block-device contract, bounded partition views,\ncanonical path/mount resolution, and traversal of existing nested FAT32 8.3\ndirectories. Remaining gaps:\n\n- structured metadata ABI promotion and native filesystem callbacks;\n- filesystem-specific errors and filesystem information;\n- generic mkdir/rmdir, truncate, nested mutation, and rollback contracts;\n- FAT long names and mutation-safe directory creation/removal;\n- ext2 and a reboot-persistence gate.",
          )

          replace_exact(
              "docs/SYSCALLS.md",
              "FAT32 syscall scope:\n\n- root directory only;\n- short 8.3 names only;\n- create, read, write, seek, rename, delete, stat, and list;\n- no subdirectories, long-file-name ABI, partition discovery, ext2 mount, or structured directory entries.",
              "FAT32 syscall scope on current `main`:\n\n- existing nested short-8.3 directory trees can be normalized, traversed, listed, statted, opened, and read;\n- create, write, unlink, and rename remain limited to root entries;\n- long names, mkdir/rmdir, truncate, nested mutation, ext2, and durable reboot semantics remain absent;\n- PR #95 adds structured stat and readdir calls while preserving the global ABI 1.0 identifier.",
          )
          replace_exact(
              "docs/SYSCALLS.md",
              "These calls are part of the v1 storage roadmap and are **not implemented** in\nthe current syscall table. Assign numbers only when the matching kernel,\nuserland wrappers, tests, and documentation land together. Append new numbers;\ndo not reuse existing syscall slots.",
              "These calls are part of the v1 storage roadmap. PR #95 currently implements the\nstructured metadata candidates as `SYS_STAT_V2=49` and `SYS_READDIR_V2=50`; they\nare not part of `main` until that PR is promoted. Assign every remaining number\nonly when kernel code, wrappers, tests, a real userland consumer, and documentation\nland together. Append numbers; never reuse an existing slot.",
          )

          replace_exact(
              "docs/DEVELOPMENT_GUIDE.md",
              "| FAT bridge | `kernel/fat32.c`, `kernel/fat32_vfs.c` | Writable root-only FAT32 8.3 workflow |",
              "| FAT implementation | `kernel/fat32.c`, `kernel/fat32_directory.c`, `kernel/fat32_vfs.c` | Nested 8.3 read traversal plus root-only mutation compatibility |",
          )
          PY
      - name: Remove one-shot workflow
        run: git rm .github/workflows/apply-v03-doc-sync.yml
      - name: Commit synchronized documentation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add README.md docs
          git commit -m "Synchronize documentation with landed v0.3 foundations"
          git push origin HEAD:docs/sync-v03-storage-abi
