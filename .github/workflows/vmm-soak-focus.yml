name: Focused VMM Soak

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: vmm-soak-focus-${{ github.ref }}
  cancel-in-progress: true

jobs:
  soak:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install toolchain and QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binutils-aarch64-linux-gnu \
            gcc-aarch64-linux-gnu \
            gdb-multiarch \
            make \
            qemu-system-arm

      - name: Build exact production artifacts
        run: make all build/virtio-blk.img

      - name: Run 30-boot FAT32 VMM soak
        run: |
          VMM_SOAK_BOOT_COUNT=30 \
          VMM_SOAK_BOOT_SECONDS=10 \
          bash tools/qemu_fat32_vmm_soak_test.sh

      - name: Upload soak diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: focused-vmm-soak-${{ github.sha }}
          path: build-vmm-soak
          if-no-files-found: error
          retention-days: 14
