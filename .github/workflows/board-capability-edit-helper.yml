name: Board capability edit helper

on:
  push:
    branches:
      - agent/board-capability-gates

permissions:
  contents: write

jobs:
  edit-kernel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/board-capability-gates
      - name: Apply exact kernel capability gates
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('kernel/kernel.c')
          text = path.read_text()

          old = '''static fat32_fs_t g_fat32_fs;

          void kernel_io_poll_input_sources(uint8_t include_uart) {
              if (include_uart != 0) {
                  input_uart_poll();
              }
              board_input_poll();
              usb_hid_poll_all();
          }
          '''
          new = '''static fat32_fs_t g_fat32_fs;

          static int board_supports(uint32_t capability) {
              return (board_capabilities() & capability) != 0;
          }

          void kernel_io_poll_input_sources(uint8_t include_uart) {
              if (include_uart != 0) {
                  input_uart_poll();
              }
              if (board_supports(BOARD_CAP_INPUT)) {
                  board_input_poll();
              }
              if (board_supports(BOARD_CAP_USB)) {
                  usb_hid_poll_all();
              }
          }

          void kernel_io_poll_network(void) {
              if (board_supports(BOARD_CAP_NET)) {
                  net_poll();
              }
          }
          '''
          if old not in text:
              if new not in text:
                  raise SystemExit('I/O service block not found')
          else:
              text = text.replace(old, new, 1)

          text = text.replace('''        net_poll();

                  sched_yield();
          ''', '''        kernel_io_poll_network();

                  sched_yield();
          ''', 1)
          text = text.replace('''    poll_input_events();
              net_poll();
          }
          ''', '''    poll_input_events();
              kernel_io_poll_network();
          }
          ''', 1)

          start = text.index('static init_status_t init_input(void) {')
          end = text.index('/*\n           * The scheduler does not return', start)
          new_input = '''static init_status_t init_input(void) {
              pci_device_t pci_devs[16];
              uint32_t pci_n = 0;

              input_queue_init();
              uart_puts("input: serial queue\\n");

              if (board_supports(BOARD_CAP_INPUT)) {
                  if (board_input_init() == 0) {
                      uart_puts("input: board ok\\n");
                  } else {
                      uart_puts("input: board unavailable\\n");
                  }
              } else {
                  uart_puts("input: board unsupported\\n");
              }

              if (board_supports(BOARD_CAP_PCI)) {
                  uint32_t assigned;

                  pci_n = pci_enumerate(pci_devs, 16);
                  assigned = pci_assign_bars(pci_devs, pci_n,
                                             0x20000000U, 0x1000U);
                  uart_puts("PCI: ");
                  print_dec64(pci_n);
                  uart_puts(" dev, ");
                  print_dec64(assigned);
                  uart_puts(" BARs\\n");
              } else {
                  uart_puts("PCI: unsupported\\n");
              }

              if (board_supports(BOARD_CAP_USB) &&
                  board_supports(BOARD_CAP_PCI)) {
                  if (usb_init() > 0) {
                      uart_puts("USB: controller initialized\\n");
                      usb_hid_state_reset();
                      uint8_t usb_ports = usb_port_count();
                      uint8_t usb_address = 1;
                      for (uint8_t port = 0; port < usb_ports; port++) {
                          if (usb_port_reset(port) > 0) {
                              uart_puts("USB port ");
                              print_dec64(port);
                              uart_puts("\\n");

                              uint8_t config_buf[256];
                              usb_config_walk_t walk;
                              usb_device_t dev;
                              if (usb_enumerate_port(port, usb_address, 1,
                                                     config_buf,
                                                     sizeof(config_buf), &dev,
                                                     &walk) == 0) {
                                  uart_puts("USB: enumeration ok\\n");
                                  uint8_t before = g_usb_hid_state.count;
                                  (void)usb_hid_add_device(&g_usb_hid_state,
                                                           &walk, &dev);
                                  for (uint8_t i = before;
                                       i < g_usb_hid_state.count; i++) {
                                      usb_hid_set_protocol_boot(
                                          &g_usb_hid_state.devices[i]);
                                  }
                                  usb_address++;
                              } else {
                                  uart_puts("USB: enum skip\\n");
                              }
                          }
                      }
                      if (g_usb_hid_state.count > 0) {
                          uart_puts("USB HID: ");
                          uart_putc('0' + (char)g_usb_hid_state.count);
                          uart_puts(" devices\\n");
                      } else {
                          uart_puts("USB HID: none\\n");
                      }
                  }
              } else if (board_supports(BOARD_CAP_USB)) {
                  uart_puts("USB: PCI unsupported\\n");
              } else {
                  uart_puts("USB: unsupported\\n");
              }

              return INIT_STATUS_OK;
          }

          '''
          text = text[:start] + new_input + text[end:]

          old = '''            storage_status = probe_storage();
                      init_status_set(INIT_PHASE_STORAGE, storage_status);
                      if (storage_status == INIT_STATUS_OK) {
                          uart_puts("storage app image: FAT32\\n");
                      } else {
                          uart_puts("storage app image: bootfs\\n");
                      }
                      init_status_set(INIT_PHASE_DISPLAY, init_display());
                      init_status_set(INIT_PHASE_NETWORK, init_network());
                      init_status_set(INIT_PHASE_INPUT, init_input());
          '''
          new = '''            if (board_supports(BOARD_CAP_STORAGE)) {
                          storage_status = probe_storage();
                          init_status_set(INIT_PHASE_STORAGE, storage_status);
                      } else {
                          storage_status = INIT_STATUS_SKIPPED;
                          init_status_set(INIT_PHASE_STORAGE,
                                          INIT_STATUS_SKIPPED);
                          uart_puts("storage: unsupported\\n");
                      }
                      if (storage_status == INIT_STATUS_OK) {
                          uart_puts("storage app image: FAT32\\n");
                      } else {
                          uart_puts("storage app image: bootfs\\n");
                      }

                      if (board_supports(BOARD_CAP_DISPLAY)) {
                          init_status_set(INIT_PHASE_DISPLAY, init_display());
                      } else {
                          init_status_set(INIT_PHASE_DISPLAY,
                                          INIT_STATUS_SKIPPED);
                          uart_puts("display: unsupported\\n");
                      }

                      if (board_supports(BOARD_CAP_NET)) {
                          init_status_set(INIT_PHASE_NETWORK, init_network());
                      } else {
                          init_status_set(INIT_PHASE_NETWORK,
                                          INIT_STATUS_SKIPPED);
                          uart_puts("network: unsupported\\n");
                      }

                      init_status_set(INIT_PHASE_INPUT, init_input());
          '''
          if old not in text:
              if new not in text:
                  raise SystemExit('kernel_main optional phase block not found')
          else:
              text = text.replace(old, new, 1)

          path.write_text(text)
          PY
      - name: Commit exact kernel update
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add kernel/kernel.c
          git commit -m "Gate kernel services by board capabilities"
          git push origin HEAD:agent/board-capability-gates
