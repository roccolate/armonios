name: Apply storage stack migration

on:
  push:
    branches:
      - agent/v03-storage-stack-completion
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/v03-storage-stack-completion
      - name: Migrate kernel storage orchestration
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('kernel/kernel.c')
          text = path.read_text()

          include_old = '#include "kernel/vfs.h"\n#include "uart/pl011.h"'
          include_new = '#include "kernel/vfs.h"\n#include "storage/mbr.h"\n#include "uart/pl011.h"'
          if include_old not in text:
              raise SystemExit('expected include anchor not found')
          text = text.replace(include_old, include_new, 1)

          state_old = 'static fat32_fs_t g_fat32_fs;\n'
          state_new = ('static fat32_fs_t g_fat32_fs;\n'
                       'static block_device_view_t g_fat32_partition_view;\n')
          if state_old not in text:
              raise SystemExit('expected FAT32 state anchor not found')
          text = text.replace(state_old, state_new, 1)

          old = '''static int fat32_read_storage(void *context, uint32_t lba, uint8_t *buffer) {
              (void)context;
              return board_storage_read(lba, 1, buffer);
          }

          static int fat32_write_storage(void *context, uint32_t lba,
                                         const uint8_t *buffer) {
              (void)context;
              return board_storage_write(lba, 1, buffer);
          }

          static int probe_fat32(void) {
              vfs_stat_t stat;

              fat32_vfs_reset();
              if (fat32_mount(&g_fat32_fs, fat32_read_storage, NULL) != 0) {
                  uart_puts("FAT32: absent\\n");
                  return -1;
              }
              fat32_set_write_sector(&g_fat32_fs, fat32_write_storage);

              uart_puts("FAT32: mounted\\n");
              if (fat32_mount_vfs_root(&g_fat32_fs, "/fat") == 0) {
                  uart_puts("FAT32 root: mounted\\n");
              } else {
                  uart_puts("FAT32 root: no\\n");
              }

              if (fat32_mount_vfs_file(&g_fat32_fs, "/fat/shell.bin",
                                       "SHELL.BIN") != 0 ||
                  vfs_stat("/fat/shell.bin", &stat) != 0) {
                  uart_puts("FAT32 shell: no\\n");
                  return -1;
              }

              uart_puts("FAT32 shell bytes: ");
              print_hex64(stat.size);
              uart_puts("\\n");

              if (fat32_mount_vfs_file(&g_fat32_fs, "/fat/edit.txt",
                                       "EDIT.TXT") == 0) {
                  uart_puts("FAT32 edit file: mounted\\n");
              } else {
                  uart_puts("FAT32 edit: no\\n");
              }
              return 0;
          }

          /*
           * Storage is optional at this stage. A valid FAT32 image lets apps load from
           * /fat, but bootfs remains the fallback when the block device or filesystem is
           * absent.
           */
          static init_status_t probe_storage(void) {
              uint8_t sector[512] KERNEL_ALIGNED(8);
              int read_status;

              if (board_storage_init() != 0) {
                  uart_puts("storage: init failed\\n");
                  return INIT_STATUS_WARN;
              }

              uart_puts("storage: initialized\\n");

              read_status = board_storage_read(0, 1, sector);
              if (read_status == 0) {
                  uint32_t word = (uint32_t)sector[0] |
                                  ((uint32_t)sector[1] << 8) |
                                  ((uint32_t)sector[2] << 16) |
                                  ((uint32_t)sector[3] << 24);

                  uart_puts("storage s0: ");
                  print_hex64(word);
                  uart_puts("\\n");
                  return probe_fat32() == 0 ? INIT_STATUS_OK : INIT_STATUS_WARN;
              } else {
                  uart_puts("storage err: ");
                  print_hex64((uint64_t)(uint32_t)read_status);
                  uart_puts("\\n");
              }

              return INIT_STATUS_WARN;
          }
          '''

          new = '''static int probe_fat32(const block_device_t *storage) {
              mbr_partition_t partition;
              const block_device_t *fat_device = storage;
              vfs_stat_t stat;

              fat32_vfs_reset();
              if (fat32_mount_device(&g_fat32_fs, fat_device) != 0) {
                  if (mbr_open_fat32_partition(storage,
                                               &g_fat32_partition_view,
                                               &partition) != 0) {
                      uart_puts("FAT32: absent\\n");
                      return -1;
                  }
                  fat_device = block_device_view_device(&g_fat32_partition_view);
                  if (fat32_mount_device(&g_fat32_fs, fat_device) != 0) {
                      uart_puts("FAT32: absent\\n");
                      return -1;
                  }
                  uart_puts("FAT32 partition: ");
                  print_dec64(partition.start_lba);
                  uart_puts("\\n");
              }

              uart_puts("FAT32: mounted\\n");
              if (fat32_mount_vfs_root(&g_fat32_fs, "/fat") == 0) {
                  uart_puts("FAT32 root: mounted\\n");
              } else {
                  uart_puts("FAT32 root: no\\n");
              }

              if (fat32_mount_vfs_file(&g_fat32_fs, "/fat/shell.bin",
                                       "SHELL.BIN") != 0 ||
                  vfs_stat("/fat/shell.bin", &stat) != 0) {
                  uart_puts("FAT32 shell: no\\n");
                  return -1;
              }

              uart_puts("FAT32 shell bytes: ");
              print_hex64(stat.size);
              uart_puts("\\n");

              if (fat32_mount_vfs_file(&g_fat32_fs, "/fat/edit.txt",
                                       "EDIT.TXT") == 0) {
                  uart_puts("FAT32 edit file: mounted\\n");
              } else {
                  uart_puts("FAT32 edit: no\\n");
              }
              return 0;
          }

          /*
           * Storage is optional at this stage. A valid FAT32 image lets apps load from
           * /fat, but bootfs remains the fallback when the block device or filesystem is
           * absent.
           */
          static init_status_t probe_storage(void) {
              const block_device_t *storage;
              uint8_t sector[512] KERNEL_ALIGNED(8);
              int read_status;

              if (board_storage_init() != 0 ||
                  (storage = board_storage_device()) == 0 ||
                  storage->block_size != FAT32_SECTOR_SIZE) {
                  uart_puts("storage: init failed\\n");
                  return INIT_STATUS_WARN;
              }

              uart_puts("storage: initialized\\n");
              uart_puts("storage sectors: ");
              print_dec64(storage->block_count);
              uart_puts("\\n");

              read_status = block_device_read(storage, 0U, 1U, sector);
              if (read_status == 0) {
                  uint32_t word = (uint32_t)sector[0] |
                                  ((uint32_t)sector[1] << 8) |
                                  ((uint32_t)sector[2] << 16) |
                                  ((uint32_t)sector[3] << 24);

                  uart_puts("storage s0: ");
                  print_hex64(word);
                  uart_puts("\\n");
                  return probe_fat32(storage) == 0
                             ? INIT_STATUS_OK
                             : INIT_STATUS_WARN;
              }

              uart_puts("storage err: ");
              print_hex64((uint64_t)(uint32_t)read_status);
              uart_puts("\\n");
              return INIT_STATUS_WARN;
          }
          '''

          old = '\n'.join(line[10:] if line.startswith('          ') else line
                          for line in old.splitlines()) + '\n'
          new = '\n'.join(line[10:] if line.startswith('          ') else line
                          for line in new.splitlines()) + '\n'
          if old not in text:
              raise SystemExit('expected storage orchestration block not found')
          text = text.replace(old, new, 1)
          path.write_text(text)
          PY
      - name: Commit migrated orchestration
        run: |
          if git diff --quiet; then
            echo "No migration changes"
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add kernel/kernel.c
          git commit -m "Mount FAT32 through block devices"
          git push origin HEAD:agent/v03-storage-stack-completion
