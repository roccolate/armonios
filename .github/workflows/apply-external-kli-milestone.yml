name: Apply external KLI milestone

on:
  push:
    branches:
      - agent/sdk-foundation-09-shell-exec-fat-kli
    paths:
      - tools/apply_external_kli_milestone_patch.py
      - .github/workflows/apply-external-kli-milestone.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out migration branch
        uses: actions/checkout@v4
        with:
          ref: agent/sdk-foundation-09-shell-exec-fat-kli
          fetch-depth: 0

      - name: Apply exact source replacements
        run: python3 tools/apply_external_kli_milestone_patch.py

      - name: Remove migration-only files
        run: |
          rm -f tools/apply_external_kli_milestone_patch.py
          rm -f .github/workflows/apply-external-kli-milestone.yml

      - name: Validate and commit migration
        run: |
          git diff --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Expose external KLI execution through Shell and FAT32"
          git push origin HEAD:agent/sdk-foundation-09-shell-exec-fat-kli
