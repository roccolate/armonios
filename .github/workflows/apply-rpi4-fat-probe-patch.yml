name: Apply RPi4 FAT probe integration

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/rpi4-emmc2-fat-layout-probe

      - name: Apply exact substitutions
        run: |
          python3 - <<'PY'
          import pathlib
          import runpy

          original_unlink = pathlib.Path.unlink

          def keep_workflow(path, *args, **kwargs):
              if str(path) == '.github/workflows/apply-rpi4-fat-probe-patch.yml':
                  return None
              return original_unlink(path, *args, **kwargs)

          pathlib.Path.unlink = keep_workflow
          runpy.run_path('tools/apply_rpi4_fat_probe_patch.py', run_name='__main__')
          PY

      - name: Commit generated integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && { echo "no changes produced"; exit 1; }
          git commit -m "Connect RPi4 probe to partitioned FAT32 discovery"
          git push origin HEAD:agent/rpi4-emmc2-fat-layout-probe
