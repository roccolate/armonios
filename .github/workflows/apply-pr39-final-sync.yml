name: Apply PR39 final synchronization

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/el0-gui-info-usercopy

      - name: Apply code and documentation updates
        run: |
          if [[ -f tools/apply_pr39_final_sync.py ]]; then
            python3 tools/apply_pr39_final_sync.py
          else
            echo "PR39 synchronization already applied"
          fi

      - name: Commit synchronized changes
        run: |
          if git diff --quiet; then
            echo "no generated changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize EL0 copy boundary and synchronize docs"
          git push origin HEAD:agent/el0-gui-info-usercopy
