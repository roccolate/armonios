name: Apply FAT32 directory migration

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  migrate:
    if: github.head_ref == 'agent/v03-fat32-directory-traversal' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out migration branch
        uses: actions/checkout@v4
        with:
          ref: agent/v03-fat32-directory-traversal

      - name: Apply guarded VFS callbacks
        run: python3 tools/apply_vfs_directory_callbacks.py

      - name: Run focused FAT32 directory gate
        run: bash tests/run_fat32_directory_test.sh

      - name: Commit VFS callback integration
        run: |
          git diff --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add kernel/vfs.c
          if git diff --cached --quiet; then
            echo "No migration changes to commit"
            exit 0
          fi
          git commit -m "Dispatch VFS stat and list by canonical path"
          git push origin HEAD:agent/v03-fat32-directory-traversal
