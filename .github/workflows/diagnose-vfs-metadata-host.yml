name: Diagnose VFS metadata host tests

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  diagnose:
    if: github.head_ref == 'agent/v03-vfs-metadata-abi-v2' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/v03-vfs-metadata-abi-v2
      - name: Install host compiler
        run: sudo apt-get update && sudo apt-get install -y gcc make
      - name: Capture host diagnostic
        run: |
          set +e
          make -C tests test > host-tests.log 2>&1
          status=$?
          tail -n 120 host-tests.log > host-diagnostic.txt
          printf '\nstatus=%s\n' "$status" >> host-diagnostic.txt
      - name: Publish diagnostic
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add host-diagnostic.txt
          git commit -m "Record temporary VFS metadata host diagnostic"
          git push origin HEAD:agent/v03-vfs-metadata-abi-v2
