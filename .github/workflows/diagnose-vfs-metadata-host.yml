name: Diagnose VFS metadata host tests

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  diagnose:
    if: github.head_ref == 'agent/v03-vfs-metadata-abi-v2' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/v03-vfs-metadata-abi-v2
      - name: Install build toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils-aarch64-linux-gnu gcc gcc-aarch64-linux-gnu make
      - name: Capture host diagnostic
        run: |
          set +e
          make > build.log 2>&1
          build_status=$?
          if [ "$build_status" -eq 0 ]; then
            make -C tests test > host-tests.log 2>&1
            status=$?
            tail -n 160 host-tests.log > host-diagnostic.txt
          else
            status=$build_status
            tail -n 160 build.log > host-diagnostic.txt
          fi
          printf '\nstatus=%s\n' "$status" >> host-diagnostic.txt
      - name: Publish diagnostic
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add host-diagnostic.txt
          git commit -m "Refresh temporary VFS metadata host diagnostic"
          git push origin HEAD:agent/v03-vfs-metadata-abi-v2
