name: Diagnose VFS metadata host tests

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'agent/v03-vfs-metadata-abi-v2'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install host compiler
        run: sudo apt-get update && sudo apt-get install -y gcc make
      - name: Run concise host diagnostic
        run: |
          set +e
          make -C tests test > host-tests.log 2>&1
          status=$?
          tail -n 120 host-tests.log
          exit "$status"
