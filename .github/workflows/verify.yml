name: Verify ArmoniOS

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build, host tests, and FAT32 smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install toolchain and QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binutils-aarch64-linux-gnu \
            gcc \
            gcc-aarch64-linux-gnu \
            make \
            qemu-system-arm

      - name: Test libarmdesk foundation
        run: bash tests/run_libarmdesk_foundation_test.sh

      - name: Test IRQ origin gate
        run: bash tests/run_irq_origin_gate_test.sh

      - name: Build kernel and userland
        run: make

      - name: Test installable libkarm SDK headers
        run: bash tests/run_libkarm_sdk_headers_test.sh

      - name: Test generated SDK bundle
        run: bash tests/run_sdk_bundle_test.sh

      - name: Test KLI1 relocation gate
        run: bash tests/run_kli1_relocation_gate_test.sh

      - name: Test generic external KLI1 packager
        run: bash tests/run_kli1_generic_packager_test.sh

      - name: Enforce kernel size limit
        run: make size

      - name: Build RPi4 EMMC2 probe package
        run: bash tools/package_rpi4_emmc2_probe.sh

      - name: Test RPi4 EMMC2 probe telemetry
        run: bash tests/run_rpi4_emmc2_probe_diag_test.sh

      - name: Test FAT32 MBR discovery
        run: bash tests/run_mbr_fat32_test.sh

      - name: Test partition block views
        run: bash tests/run_block_view_fat32_test.sh

      - name: Test canonical VFS paths
        run: bash tests/run_vfs_path_test.sh

      - name: Test direct VFS path reads
        run: bash tests/run_vfs_direct_read_test.sh

      - name: Test KLI1 image loading from VFS
        run: bash tests/run_user_image_vfs_loader_test.sh

      - name: Test application image source policy
        run: bash tests/run_app_image_source_test.sh

      - name: Test external KLI FAT image
        run: bash tests/run_external_kli_fat_image_test.sh

      - name: Execute external KLI from FAT32 in EL0
        run: bash tools/qemu_external_kli_runtime_test.sh

      - name: Test nested FAT32 directories
        run: bash tests/run_fat32_directory_test.sh

      - name: Test structured VFS metadata ABI
        run: bash tests/run_vfs_metadata_abi_test.sh

      - name: Test filesystem information ABI
        run: bash tests/run_vfs_fsinfo_test.sh

      - name: Upload RPi4 EMMC2 probe package
        uses: actions/upload-artifact@v4
        with:
          name: rpi4-emmc2-probe-${{ github.sha }}
          path: build-rpi4-emmc2-probe/package
          if-no-files-found: error
          retention-days: 30

      - name: Run native host tests
        run: make -C tests test

      - name: Test deferred runtime service
        run: |
          set -o pipefail
          bash tests/run_runtime_service_test.sh 2>&1 | tee runtime-service-test.log

      - name: Test VMM soak lifecycle
        run: bash tests/run_vmm_soak_lifecycle_test.sh

      - name: Upload runtime-service log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-service-test-log
          path: runtime-service-test.log
          if-no-files-found: warn
          retention-days: 14

      - name: Enforce userland stack limit
        run: make stack-check

      - name: Run FAT32 QEMU smoke test
        run: make qemu-fs-test

      - name: Upload QEMU smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-fs-test-log
          path: build/qemu-fs-test.log
          if-no-files-found: warn
          retention-days: 14

      - name: Upload external KLI runtime log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: external-kli-runtime-log
          path: build/tests/external-kli-runtime/serial.log
          if-no-files-found: warn
          retention-days: 14

      - name: Upload QEMU kernel ELF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-kernel-elf-${{ github.sha }}
          path: build/kernel.elf
          if-no-files-found: error
          retention-days: 14
