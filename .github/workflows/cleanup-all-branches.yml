name: Cleanup all branches except main

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/cleanup-all-branches.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete every branch except main
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          KEEP_BRANCH: main
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.parse
          import urllib.request

          token = os.environ["GH_TOKEN"]
          repository = os.environ["REPOSITORY"]
          keep = os.environ["KEEP_BRANCH"]
          api = "https://api.github.com"
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "armonios-branch-cleanup",
          }

          branches = []
          page = 1
          while True:
              url = f"{api}/repos/{repository}/branches?per_page=100&page={page}"
              request = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(request) as response:
                  batch = json.load(response)
              branches.extend(item["name"] for item in batch)
              if len(batch) < 100:
                  break
              page += 1

          targets = sorted(name for name in branches if name != keep)
          print(f"Keeping branch: {keep}")
          print(f"Deleting {len(targets)} branches")

          failures = []
          for name in targets:
              encoded = urllib.parse.quote(name, safe="")
              url = f"{api}/repos/{repository}/git/refs/heads/{encoded}"
              request = urllib.request.Request(url, headers=headers, method="DELETE")
              try:
                  with urllib.request.urlopen(request) as response:
                      response.read()
                  print(f"deleted: {name}")
              except urllib.error.HTTPError as error:
                  body = error.read().decode("utf-8", errors="replace")
                  failures.append((name, error.code, body))
                  print(f"failed: {name}: HTTP {error.code}: {body}", file=sys.stderr)

          if failures:
              raise SystemExit(1)
          PY
