name: Apply PR39 review fixes

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/el0-gui-info-usercopy

      - name: Apply review fixes
        run: |
          if [[ -f tools/apply_pr39_review_fixes.py ]]; then
            python3 tools/apply_pr39_review_fixes.py
          else
            echo "PR39 review fixes already applied"
          fi

      - name: Commit review fixes
        run: |
          if git diff --quiet; then
            echo "no generated changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix PR39 build and risk documentation"
          git push origin HEAD:agent/el0-gui-info-usercopy
