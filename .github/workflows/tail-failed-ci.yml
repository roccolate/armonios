name: Tail failed CI log

on:
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  tail:
    runs-on: ubuntu-latest
    steps:
      - name: Download and extract failed job log
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail --location \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/roccolate/armonios/actions/jobs/89294218248/logs \
            --output failed-job.log
          echo "recent verification gates:"
          grep -n -- '==>' failed-job.log | tail -n 12 || true
          echo "failure and error lines:"
          grep -niE 'FAIL:|error:|make: \*\*\*|Process completed with exit code' \
            failed-job.log | tail -n 60 || true
