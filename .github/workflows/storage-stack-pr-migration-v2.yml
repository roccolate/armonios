name: Run bounded storage migration

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Apply bounded migration
        run: python3 tools/apply_storage_kernel_migration.py
      - name: Commit migrated orchestration
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add kernel/kernel.c
          git commit -m "Mount FAT32 through block devices"
          git push origin HEAD:${{ github.head_ref }}
