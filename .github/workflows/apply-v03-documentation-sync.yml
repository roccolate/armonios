name: Apply v0.3 documentation sync

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'docs/v03-storage-vfs-sync' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/v03-storage-vfs-sync
      - name: Apply guarded documentation updates
        run: python3 tools/apply_v03_documentation_sync.py
      - name: Remove migration helpers
        run: |
          rm tools/apply_v03_documentation_sync.py
          rm .github/workflows/apply-v03-documentation-sync.yml
      - name: Publish synchronized documentation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add README.md docs/CURRENT_STATE.md docs/ROADMAP.md docs/ARCHITECTURE.md docs/SYSCALLS.md docs/V03_STORAGE_VFS_STATUS.md tools/apply_v03_documentation_sync.py .github/workflows/apply-v03-documentation-sync.yml
          git commit -m "Synchronize v0.3 storage and VFS documentation"
          git push origin HEAD:docs/v03-storage-vfs-sync
