name: Compact process lifecycle

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  compact:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out lifecycle branch
        uses: actions/checkout@v4
        with:
          ref: agent/process-parent-wait-lifecycle
          fetch-depth: 0

      - name: Compact lifecycle implementation
        shell: bash
        run: |
          rm -f .github/process-lifecycle-compact.log
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.github/scripts/compact_process_lifecycle.py')
          text = path.read_text(encoding='utf-8')
          start = text.find('\nreplace_once(\n    "tests/run_process_parent_wait_test.sh",')
          end = text.find('\n\nprint("compacted process lifecycle")', start)
          if start < 0 or end < 0:
              raise SystemExit('test runner transformation block not found')
          path.write_text(text[:start] + text[end:], encoding='utf-8')
          PY

          set +e
          python3 .github/scripts/compact_process_lifecycle.py \
            > .github/process-lifecycle-compact.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            cat .github/process-lifecycle-compact.log
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/process-lifecycle-compact.log
            git commit -m "Capture lifecycle compaction failure"
            git push origin HEAD:agent/process-parent-wait-lifecycle
            exit "$status"
          fi

      - name: Remove temporary helper and publish
        run: |
          rm -f .github/process-lifecycle-compact.log
          rm -f .github/scripts/compact_process_lifecycle.py
          rm -f .github/workflows/compact-process-lifecycle.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Compact parent-owned process lifecycle"
          git push origin HEAD:agent/process-parent-wait-lifecycle
