name: Apply process lifecycle patch

on:
  push:
    branches:
      - agent/process-parent-wait-lifecycle
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out lifecycle branch
        uses: actions/checkout@v4
        with:
          ref: agent/process-parent-wait-lifecycle
          fetch-depth: 0

      - name: Apply and commit lifecycle patch
        shell: bash
        run: |
          rm -f .github/process-lifecycle-patch.log
          sed -i '161s/2/3/' .github/scripts/apply_process_lifecycle_patch.py
          sed -n '157,162p' .github/scripts/apply_process_lifecycle_patch.py
          grep -A4 -F 'replace_all_exact(' .github/scripts/apply_process_lifecycle_patch.py | grep -q '    3,'

          set +e
          python3 .github/scripts/apply_process_lifecycle_patch.py \
            > .github/process-lifecycle-patch.log 2>&1
          status=$?
          set -e

          if [ "$status" -ne 0 ]; then
            cat .github/process-lifecycle-patch.log
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/process-lifecycle-patch.log
            git commit -m "Capture process lifecycle patch failure [patch-diagnostic]"
            git push origin HEAD:agent/process-parent-wait-lifecycle
            exit "$status"
          fi

          rm -f .github/process-lifecycle-patch.log
          rm -f .github/scripts/apply_process_lifecycle_patch.py
          rm -f .github/workflows/apply-process-lifecycle.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix parent-owned process wait lifecycle [process-lifecycle-applied]"
          git push origin HEAD:agent/process-parent-wait-lifecycle
