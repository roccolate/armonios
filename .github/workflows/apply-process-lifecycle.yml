name: Apply process lifecycle patch

on:
  push:
    branches:
      - agent/process-parent-wait-lifecycle

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[process-lifecycle-applied]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply lifecycle patch
        run: python3 .github/scripts/apply_process_lifecycle_patch.py

      - name: Remove temporary patch machinery
        run: |
          rm -f .github/scripts/apply_process_lifecycle_patch.py
          rm -f .github/workflows/apply-process-lifecycle.yml

      - name: Commit patched tree
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix parent-owned process wait lifecycle [process-lifecycle-applied]"
          git push origin HEAD:agent/process-parent-wait-lifecycle
