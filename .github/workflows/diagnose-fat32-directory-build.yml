name: Diagnose FAT32 directory build

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  diagnose:
    if: github.head_ref == 'agent/v03-fat32-directory-traversal' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/v03-fat32-directory-traversal

      - name: Install build toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils-aarch64-linux-gnu gcc-aarch64-linux-gnu make

      - name: Capture concise build failure
        run: |
          set +e
          make V=1 > build-full.log 2>&1
          status=$?
          if [ "$status" -eq 0 ]; then
            printf 'build succeeded\n' > build-diagnostic.txt
          else
            grep -nE 'error:|undefined reference|multiple definition|make: \*\*\*' build-full.log > build-diagnostic.txt || true
            printf '\n--- tail ---\n' >> build-diagnostic.txt
            tail -n 80 build-full.log >> build-diagnostic.txt
          fi
          cat build-diagnostic.txt

      - name: Publish diagnostic
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add build-diagnostic.txt
          git commit -m "Record temporary directory build diagnostic"
          git push origin HEAD:agent/v03-fat32-directory-traversal
