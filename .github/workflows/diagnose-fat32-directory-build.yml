name: Finalize FAT32 directory build fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'agent/v03-fat32-directory-traversal' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/v03-fat32-directory-traversal

      - name: Replace implicit memcpy with explicit callbacks
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('kernel/vfs.c')
          text = path.read_text()
          old = '''            g_mounts[i].ops = *ops;
'''
          new = '''            g_mounts[i].ops.open = ops->open;
            g_mounts[i].ops.list = ops->list;
            g_mounts[i].ops.stat_path = ops->stat_path;
            g_mounts[i].ops.list_path = ops->list_path;
            g_mounts[i].ops.unlink = ops->unlink;
            g_mounts[i].ops.rename = ops->rename;
'''
          if text.count(old) != 1:
              raise SystemExit('expected exactly one VFS mount struct assignment')
          path.write_text(text.replace(old, new, 1))
          PY

      - name: Validate freestanding build and focused gate
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils-aarch64-linux-gnu gcc-aarch64-linux-gnu make
          make
          bash tests/run_fat32_directory_test.sh
          git diff --check

      - name: Commit fix and remove temporary diagnostics
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/diagnose-fat32-directory-build.yml build-diagnostic.txt tools/finalize-fat32-directory.trigger
          git add kernel/vfs.c
          git commit -m "Avoid libc memcpy in VFS mount registration"
          git push origin HEAD:agent/v03-fat32-directory-traversal
