name: CI - Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ci-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 40

    steps:
    - name: Runner bootstrap
      run: |
        echo "runner: ${RUNNER_NAME}"
        echo "os: ${RUNNER_OS}"
        echo "arch: ${RUNNER_ARCH}"
        date -u +%Y-%m-%dT%H:%M:%SZ

    - name: Checkout
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          gcc-aarch64-linux-gnu \
          binutils-aarch64-linux-gnu \
          gdb-multiarch \
          qemu-system-arm

    - name: Verify release baseline
      run: bash tools/verify.sh

    - name: Upload QEMU serial logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: qemu-serial-logs
        if-no-files-found: ignore
        path: |
          build/qemu-*.log
          build-focus/qemu-*.log
          build-usercopy-test/qemu-*.log
          build-runtime-stress/qemu-*.log
          build-runtime-net-stress/*.log
          build-vmm-soak/*.log
