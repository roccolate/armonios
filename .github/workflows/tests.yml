name: CI - Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: sudo apt-get update && sudo apt-get install -y build-essential gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu

    - name: Run unit tests
      run: make -C tests test

    - name: Build kernel
      run: make

    - name: Check kernel size
      run: make size
